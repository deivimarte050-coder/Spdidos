<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spdidos - Vista Móvil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        
        .phone-container {
            background: #1a1a1a;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3), 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            transform: scale(0.9);
        }
        
        .phone-screen {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            width: 375px;
            height: 812px;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.1);
        }
        
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 30px;
            background: black;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        
        .phone-content {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 32px;
        }
        
        .phone-label {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .controls {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .phone-home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 2px;
        }
        
        @media (max-width: 768px) {
            .phone-container {
                transform: scale(0.7);
            }
        }
    </style>
</head>
<body>
    <div class="phone-label">📱 Spdidos - Vista Móvil Simulada</div>
    
    <div class="phone-container">
        <div class="phone-screen">
            <div class="phone-notch"></div>
            <iframe 
                src="http://localhost:3000" 
                class="phone-content"
                frameborder="0"
                allowfullscreen
            ></iframe>
            <div class="phone-home-indicator"></div>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="reloadFrame()">🔄 Recargar</button>
            <button class="control-btn" onclick="openFullscreen()">⛶ Pantalla Completa</button>
            <button class="control-btn" onclick="rotatePhone()">🔄 Rotar</button>
        </div>
    </div>

    <script>
        function reloadFrame() {
            const iframe = document.querySelector('.phone-content');
            iframe.src = iframe.src;
        }
        
        function openFullscreen() {
            const elem = document.querySelector('.phone-container');
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }
        
        let isRotated = false;
        function rotatePhone() {
            const phone = document.querySelector('.phone-container');
            if (!isRotated) {
                phone.style.transform = 'scale(0.9) rotate(90deg)';
                isRotated = true;
            } else {
                phone.style.transform = 'scale(0.9) rotate(0deg)';
                isRotated = false;
            }
        }
        
        // Ajustar el iframe para que cargue correctamente
        window.addEventListener('load', () => {
            const iframe = document.querySelector('.phone-content');
            iframe.onload = function() {
                console.log('Aplicación cargada en vista móvil');
            };
        });
    </script>
</body>
</html>
